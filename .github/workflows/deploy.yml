name: ⚛️ Deploy React to VPS (Nginx)

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Create env for build
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" > .env.production
          echo "VITE_APP_NAME=${{ secrets.VITE_APP_NAME }}" >> .env.production

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          source: "dist/*"
          target: "/tmp/react_build"

      - name: Deploy and activate on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            set -e

            echo "🚀 Starting frontend deployment..."

            # Crear directorios necesarios
            mkdir -p /var/www/sems_frontend
            mkdir -p /var/www/backups/sems_frontend

            # Backup del build anterior (si existe)
            if [ -d "/var/www/sems_frontend" ] && [ "$(ls -A /var/www/sems_frontend)" ]; then
              BACKUP_NAME="sems_frontend_backup_$(date +%Y%m%d_%H%M%S)"
              echo "📦 Creating backup: $BACKUP_NAME"
              cp -r /var/www/sems_frontend /var/www/backups/sems_frontend/$BACKUP_NAME
              
              # Mantener solo los últimos 5 backups
              cd /var/www/backups/sems_frontend
              ls -t | tail -n +6 | xargs -r rm -rf
            fi

            # Limpiar directorio anterior
            echo "🧹 Cleaning previous build..."
            rm -rf /var/www/sems_frontend/*

            # Copiar nuevo build
            echo "📋 Copying new build..."
            cp -r /tmp/react_build/* /var/www/sems_frontend/

            # Verificar archivos críticos
            if [ ! -f "/var/www/sems_frontend/index.html" ]; then
              echo "❌ ERROR: index.html not found after deployment"
              exit 1
            fi

            # Establecer permisos correctos
            echo "🔐 Setting permissions..."
            chown -R www-data:www-data /var/www/sems_frontend
            chmod -R 755 /var/www/sems_frontend

            # Configurar Nginx si no existe
            if [ ! -f "/etc/nginx/sites-available/sems_frontend" ]; then
              echo "⚙️ Setting up Nginx configuration..."
              cat > /etc/nginx/sites-available/sems_frontend << 'NGINX_CONF'
server {
    listen 80;
    server_name _;
    
    root /var/www/sems_frontend;
    index index.html;

    # Logging
    access_log /var/log/nginx/sems_frontend.access.log;
    error_log /var/log/nginx/sems_frontend.error.log;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # React Router - Fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static Assets Caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Health Check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # API Proxy (opcional - descomentar si necesitas conectar con backend)
    # location /api/ {
    #     proxy_pass http://localhost:3000/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_cache_bypass $http_upgrade;
    # }
}
NGINX_CONF

              # Activar sitio
              ln -sf /etc/nginx/sites-available/sems_frontend /etc/nginx/sites-enabled/
              
              # Remover default site si existe
              rm -f /etc/nginx/sites-enabled/default
            fi

            # Verificar configuración de Nginx
            echo "🔍 Testing Nginx configuration..."
            nginx -t

            # Recargar Nginx
            echo "🔄 Reloading Nginx..."
            systemctl reload nginx

            # Limpiar archivos temporales
            rm -rf /tmp/react_build

            # Verificar que el servicio esté corriendo
            if ! systemctl is-active --quiet nginx; then
              echo "❌ ERROR: Nginx is not running"
              exit 1
            fi

            echo "✅ Frontend deployed successfully!"
            echo "🌐 Site available at: http://${{ secrets.VPS_HOST || 'your-domain.com' }}"
